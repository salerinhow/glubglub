<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>StreamPlay</title>

    <!-- Fonte estilo Netflix -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="SP.css">
</head>
<body>

<div class="logo">StreamPlay</div>

<h1>Escolha seu Plano</h1>

<div class="planos">

    <div class="card">
        <h2>BETA</h2>
        <p class="preco">R$ 19,90</p>

        <ul>
            <li>Qualidade HD</li>
            <li>1 tela</li>
            <li>Sem download</li>
        </ul>

        <button>Assinar</button>
    </div>

    <div class="card destaque">
        <h2>CHAD</h2>
        <p class="preco">R$ 29,90</p>

        <ul>
            <li>Full HD</li>
            <li>2 telas</li>
            <li>Download disponível</li>
        </ul>

        <button>Assinar</button>
    </div>

    <div class="card premium">
        <h2>AURA+EGO</h2>
        <p class="preco">R$ 67,00</p>

        <ul>
            <li>4K Ultra HD</li>
            <li>4 telas</li>
            <li>Download + exclusivos</li>
        </ul>

        <button>Assinar</button>
    </div>

</div>

</body>
</html>
